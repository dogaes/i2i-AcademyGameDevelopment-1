<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lane Dodger</title>
</head>
<body>
  <div id="hud">
    <div class="label">Score</div>
    <div id="score">0</div>
    <div class="label" style="margin-top:8px;">Best</div>
    <div id="highScore">0</div>
  </div>
  <div id="hint">Left/Right or A/D: switch lanes · Up/Space/W: jump</div>
  <div id="overlay">
    <h1>Lane Dodger</h1>
    <p>Dodge the incoming blocks.</p>
    <button id="startBtn">Start Run</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
